<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goon Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- The Skinny is not on Google Fonts, using a tall condensed script alternative -->
  <style>
    @font-face {
      font-family: 'TheSkinny';
      src: url('the_skinny/TheSkinny.otf') format('opentype');
      font-weight: normal;
    }
    @font-face {
      font-family: 'TheSkinny';
      src: url('the_skinny/TheSkinny-bold.otf') format('opentype');
      font-weight: bold;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'TheSkinny', cursive;
    }

    .author {
      font-family: 'Times New Roman', Times, serif;
      font-size: 1.1rem;
      color: #cccccc;
      letter-spacing: 0.05em;
      margin-top: 16px;
      white-space: nowrap;
    }

    .presenter {
      font-family: 'Times New Roman', Times, serif;
      font-size: 1.1rem;
      color: #cccccc;
      letter-spacing: 0.05em;
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    .neon-sign {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2em;
      padding: 60px 80px;
      position: relative;
    }

    .neon-line {
      display: block;
      font-size: clamp(3rem, 10vw, 7rem);
      letter-spacing: 0.05em;
      line-height: 1.1;
      text-transform: uppercase;
      position: relative;
      white-space: nowrap;
    }

    /* RED neon - top line */
    .neon-red {
      color: #ff2020;
      text-shadow:
        0 0 4px #fff,
        0 0 10px #fff,
        0 0 20px #ff2020,
        0 0 40px #ff2020,
        0 0 80px #ff2020,
        0 0 120px #cc0000,
        0 0 160px #cc0000;
      animation: flicker-red 6s infinite;
    }

    /* WHITE neon - bottom line */
    .neon-white {
      color: #e8e8ff;
      text-shadow:
        0 0 4px #fff,
        0 0 10px #fff,
        0 0 20px #c8c8ff,
        0 0 40px #a0a0ff,
        0 0 80px #8080ee,
        0 0 120px #6060cc,
        0 0 160px #4040aa;
      animation: flicker-white 8s infinite;
    }

    /* Glow halo behind the sign */
    .neon-sign::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background: radial-gradient(ellipse at center, rgba(60, 60, 140, 0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    @keyframes flicker-red {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
        text-shadow:
          0 0 4px #fff,
          0 0 10px #fff,
          0 0 20px #ff2020,
          0 0 40px #ff2020,
          0 0 80px #ff2020,
          0 0 120px #cc0000,
          0 0 160px #cc0000;
        opacity: 1;
      }
      20%, 24%, 55% {
        text-shadow: none;
        opacity: 0.4;
      }
    }

    @keyframes flicker-white {
      0%, 30%, 32%, 80%, 100% {
        text-shadow:
          0 0 4px #fff,
          0 0 10px #fff,
          0 0 20px #c8c8ff,
          0 0 40px #a0a0ff,
          0 0 80px #8080ee,
          0 0 120px #6060cc,
          0 0 160px #4040aa;
        opacity: 1;
      }
      31%, 81% {
        text-shadow: none;
        opacity: 0.5;
      }
    }
  </style>
</head>
<body>
  <p class="presenter">White Chapel &amp; Alfredo Jaar presents</p>
  <div class="neon-sign">
    <span class="neon-line neon-red" id="line1"></span>
    <span class="neon-line neon-white" id="line2"></span>
    <p class="author" id="author"></p>
  </div>
  <script>
    async function loadQuote() {
      const res = await fetch('quotes.txt');
      const text = await res.text();
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);

      // Group into triplets: line1, line2, author
      const quotes = [];
      for (let i = 0; i + 2 < lines.length; i += 3) {
        quotes.push({ line1: lines[i], line2: lines[i + 1], author: lines[i + 2] });
      }

      const q = quotes[Math.floor(Math.random() * quotes.length)];
      document.getElementById('line1').textContent = q.line1;
      document.getElementById('line2').textContent = q.line2;
      document.getElementById('author').textContent = 'by ' + q.author;
    }

    function equalizeLines() {
      const lines = document.querySelectorAll('.neon-line');
      // Reset any previous scaling
      lines.forEach(l => l.style.transform = '');
      const widths = Array.from(lines).map(l => l.getBoundingClientRect().width);
      const maxWidth = Math.max(...widths);
      lines.forEach((l, i) => {
        const scale = maxWidth / widths[i];
        if (scale !== 1) {
          l.style.transformOrigin = 'center';
          l.style.transform = `scaleX(${scale})`;
        }
      });
    }

    loadQuote().then(() => document.fonts.ready).then(equalizeLines);
    window.addEventListener('resize', equalizeLines);
  </script>
</body>
</html>
