<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goon Garden</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <style>
    @font-face {
      font-family: 'TheSkinny';
      src: url('the_skinny/TheSkinny.otf') format('opentype');
      font-weight: normal;
    }
    @font-face {
      font-family: 'TheSkinny';
      src: url('the_skinny/TheSkinny-bold.otf') format('opentype');
      font-weight: bold;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'TheSkinny', cursive;
      padding: 80px 0 100px;
    }

    .presenter {
      font-family: 'Times New Roman', Times, serif;
      font-size: 1.1rem;
      color: #cccccc;
      letter-spacing: 0.05em;
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    .neon-sign {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2em;
      padding: 40px 0;
      position: relative;
      width: 100%;
    }

    .neon-line {
      display: block;
      font-size: 10vw;
      letter-spacing: 0.05em;
      line-height: 1.1;
      text-transform: uppercase;
      position: relative;
      white-space: nowrap;
      transform-origin: center;
    }

    .author {
      font-family: 'Times New Roman', Times, serif;
      font-size: 1.1rem;
      color: #cccccc;
      letter-spacing: 0.05em;
      margin-top: 16px;
      white-space: nowrap;
    }

    /* RED neon - top line */
    .neon-red {
      color: #ff2020;
      text-shadow:
        0 0 4px #fff,
        0 0 10px #fff,
        0 0 20px #ff2020,
        0 0 40px #ff2020,
        0 0 80px #ff2020,
        0 0 120px #cc0000,
        0 0 160px #cc0000;
      animation: flicker-red 6s infinite;
    }

    /* WHITE neon - bottom line */
    .neon-white {
      color: #e8e8ff;
      text-shadow:
        0 0 4px #fff,
        0 0 10px #fff,
        0 0 20px #c8c8ff,
        0 0 40px #a0a0ff,
        0 0 80px #8080ee,
        0 0 120px #6060cc,
        0 0 160px #4040aa;
      animation: flicker-white 8s infinite;
    }

    /* Glow halo behind the sign */
    .neon-sign::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background: radial-gradient(ellipse at center, rgba(60, 60, 140, 0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Refresh button */
    .refresh-btn {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Times New Roman', Times, serif;
      font-size: 1rem;
      color: #aaa;
      background: #222;
      border: none;
      border-radius: 4px;
      padding: 8px 20px;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .refresh-btn:hover {
      background: #2e2e2e;
      color: #ddd;
    }


    @keyframes flicker-red {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
        text-shadow:
          0 0 4px #fff,
          0 0 10px #fff,
          0 0 20px #ff2020,
          0 0 40px #ff2020,
          0 0 80px #ff2020,
          0 0 120px #cc0000,
          0 0 160px #cc0000;
        opacity: 1;
      }
      20%, 24%, 55% {
        text-shadow: none;
        opacity: 0.4;
      }
    }

    @keyframes flicker-white {
      0%, 30%, 32%, 80%, 100% {
        text-shadow:
          0 0 4px #fff,
          0 0 10px #fff,
          0 0 20px #c8c8ff,
          0 0 40px #a0a0ff,
          0 0 80px #8080ee,
          0 0 120px #6060cc,
          0 0 160px #4040aa;
        opacity: 1;
      }
      31%, 81% {
        text-shadow: none;
        opacity: 0.5;
      }
    }
  </style>
</head>
<body>
  <p class="presenter">White Chapel &amp; Alfredo Jaar present</p>
  <div class="neon-sign">
    <span class="neon-line neon-red" id="line1"></span>
    <span class="neon-line neon-white" id="line2"></span>
    <p class="author" id="author"></p>
  </div>
  <button class="refresh-btn" id="refresh-btn">— goons</button>

  <script>
    let quotes = [];
    let currentIndex = 0;

    async function loadQuotes() {
      const res = await fetch('quotes.txt');
      const text = await res.text();
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      for (let i = 0; i + 2 < lines.length; i += 3) {
        quotes.push({ line1: lines[i], line2: lines[i + 1], author: lines[i + 2] });
      }
    }

    function showQuote(index) {
      const q = quotes[index];
      document.getElementById('line1').textContent = q.line1;
      document.getElementById('line2').textContent = q.line2;
      document.getElementById('author').textContent = 'by ' + q.author;
      equalizeLines();
    }

    function equalizeLines() {
      const lines = document.querySelectorAll('.neon-line');
      lines.forEach(l => { l.style.transform = ''; l.style.fontSize = ''; });

      // Find font size that makes the widest line fit within 90vw
      const maxAllowed = window.innerWidth * 0.90;
      let fontSize = window.innerWidth * 0.10; // start at 10vw

      lines.forEach(l => { l.style.fontSize = fontSize + 'px'; });

      const widths = Array.from(lines).map(l => l.getBoundingClientRect().width);
      const maxWidth = Math.max(...widths);

      if (maxWidth > maxAllowed) {
        fontSize = fontSize * (maxAllowed / maxWidth);
        lines.forEach(l => { l.style.fontSize = fontSize + 'px'; });
      }

      // Now equalize widths with scaleX
      const newWidths = Array.from(lines).map(l => l.getBoundingClientRect().width);
      const newMax = Math.max(...newWidths);
      lines.forEach((l, i) => {
        const scale = newMax / newWidths[i];
        if (scale !== 1) {
          l.style.transformOrigin = 'center';
          l.style.transform = `scaleX(${scale})`;
        }
      });
    }

    function setBtn(n) {
      document.getElementById('refresh-btn').textContent = n.toLocaleString() + ' goons';
    }

    const WORKER = 'https://goon-counter.sol-posta.workers.dev';

    async function incrementCounter() {
      try {
        const res = await fetch(WORKER + '/increment');
        const data = await res.json();
        setBtn(data.count);
      } catch (e) {}
    }

    async function fetchCounter() {
      try {
        const res = await fetch(WORKER + '/count');
        const data = await res.json();
        setBtn(data.count);
      } catch (e) {}
    }

    function nextQuote() {
      let next;
      do { next = Math.floor(Math.random() * quotes.length); } while (quotes.length > 1 && next === currentIndex);
      currentIndex = next;
      showQuote(currentIndex);
      incrementCounter();
    }

    document.getElementById('refresh-btn').addEventListener('click', nextQuote);

    loadQuotes().then(() => {
      document.fonts.ready.then(() => showQuote(0));
    });
    fetchCounter();

    window.addEventListener('resize', equalizeLines);
  </script>
</body>
</html>
